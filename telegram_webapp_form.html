<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리 종목 편집</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 16px; }
        h2 { margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li { display: flex; align-items: center; gap: 8px;
             padding: 8px; border-bottom: 1px solid #ddd; }
        .info { flex: 1; min-width: 0; }
        .info .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .code { color: #888; font-size: 0.85em; }
        .flags { display: flex; flex-direction: column; font-size: 0.8em; }
        .flags label { white-space: nowrap; }
        .del { background: #e74c3c; color: #fff; border: none; padding: 6px 10px;
               border-radius: 4px; }
        .add-box { margin-top: 16px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        .add-box label { display: block; margin-top: 8px; font-weight: bold; }
        .add-box .chk { font-weight: normal; }
        .field { display: flex; gap: 6px; margin-top: 4px; }
        .field input[type=text] { flex: 1; padding: 8px; box-sizing: border-box; }
        .field button { padding: 8px 12px; white-space: nowrap; }
        button.primary { margin-top: 12px; padding: 10px 16px; width: 100%; font-size: 15px; }
        #save { margin-top: 20px; padding: 14px; width: 100%; font-size: 16px;
                background: #2ecc71; color: #fff; border: none; border-radius: 6px; }
        .empty { color: #888; padding: 8px 0; }
        .candidates { margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .candidates .cand { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
        .candidates .cand:last-child { border-bottom: none; }
        .candidates .cand:hover { background: #f0f8ff; }
        .status { margin-top: 6px; font-size: 0.85em; color: #888; }
        .status.error { color: #e74c3c; }
    </style>
</head>
<body>
    <h2 id="title">관리 종목 목록</h2>
    <ul id="list"></ul>

    <div class="add-box">
        <strong>종목 추가</strong>

        <label for="iscd">종목코드 (iscd)</label>
        <div class="field">
            <input type="text" id="iscd" placeholder="예: 005930">
            <button onclick="lookupByCode()">확인</button>
        </div>

        <label for="name">종목명 (name)</label>
        <div class="field">
            <input type="text" id="name" placeholder="예: 삼성전자">
            <button onclick="searchByName()">찾기</button>
        </div>

        <div id="candidates" class="candidates" style="display:none"></div>

        <label for="exchange">거래소 (exchange)</label>
        <div class="field">
            <input type="text" id="exchange" placeholder="확인/찾기로 자동 채움">
        </div>

        <label class="chk"><input type="checkbox" id="new-is-used" checked> 사용 (is_used)</label>
        <label class="chk"><input type="checkbox" id="new-regular-only"> 정규장 전용 (regular_only)</label>

        <button class="primary" onclick="addRow()">➕ 추가</button>
        <div id="status" class="status"></div>
    </div>

    <button id="save" onclick="save()">💾 저장</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 봇이 URL의 ?data= 로 실어 보낸 대상 시장/현재 목록.
        // 형식: {"market": "domestic"|"overseas", "rows": [ {market_key,exchange,iscd,name,is_used,regular_only}, ... ]}
        let market = 'domestic';
        let rows = [];

        // build_stock_master_json.py가 만든 종목 마스터(브라우저 조회용).
        let master = [];        // [{iscd, name, market}, ...]
        let masterByCode = {};  // iscd -> {iscd, name, market}

        const MAX_CANDIDATES = 10;
        const TRUTHY = ['true', '1', 'y', 'yes', 't'];
        // 시장별 라벨/마스터 파일/입력 예시.
        const MARKET_CONFIG = {
            domestic: { label: '국장', file: './domestic_stocks.json',
                        codeHint: '예: 005930', nameHint: '예: 삼성전자' },
            overseas: { label: '미장', file: './overseas_stocks.json',
                        codeHint: '예: AAPL', nameHint: '예: 애플' },
        };

        function truthy(v) {
            return TRUTHY.includes(String(v == null ? '' : v).trim().toLowerCase());
        }

        function loadInitialData() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('data');
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                if (parsed.market === 'overseas') market = 'overseas';
                rows = Array.isArray(parsed.rows) ? parsed.rows : [];
            } catch (e) {
                console.error('data 파싱 실패', e);
            }
        }

        function applyMarketUi() {
            const cfg = MARKET_CONFIG[market];
            document.getElementById('title').textContent = `${cfg.label} 종목 목록`;
            document.getElementById('iscd').placeholder = cfg.codeHint;
            document.getElementById('name').placeholder = cfg.nameHint;
        }

        // 대상 시장의 종목 마스터 JSON을 폼과 같은 위치에서 fetch(같은 오리진이라 CORS 없음).
        function loadMaster() {
            const cfg = MARKET_CONFIG[market];
            fetch(cfg.file)
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(data => {
                    master = Array.isArray(data) ? data : [];
                    masterByCode = {};
                    master.forEach(item => { masterByCode[item.iscd] = item; });
                    setStatus(`${cfg.label} 종목 마스터 ${master.length}개 로드됨. 확인/찾기 사용 가능.`);
                })
                .catch(e => {
                    setStatus('종목 마스터를 불러오지 못했습니다. 직접 입력해 추가하세요. (' + e.message + ')', true);
                });
        }

        function setStatus(msg, isError) {
            const el = document.getElementById('status');
            el.textContent = msg || '';
            el.className = 'status' + (isError ? ' error' : '');
        }

        // 확인: 종목코드로 이름을 찾아 name 입력칸을 채운다.
        function lookupByCode() {
            const code = document.getElementById('iscd').value.trim();
            if (!code) { setStatus('종목코드를 입력하세요.', true); return; }
            const hit = masterByCode[code];
            if (!hit) { setStatus(`코드 '${code}'에 해당하는 종목을 찾지 못했습니다.`, true); return; }
            document.getElementById('name').value = hit.name;
            // exchange는 마스터의 시장 라벨(국장 KOSPI/KOSDAQ, 미장 NAS/NYS/AMS)로 맞춘다.
            document.getElementById('exchange').value = hit.market || '';
            hideCandidates();
            setStatus(`확인: ${hit.name} (${hit.market})`);
        }

        // 찾기: 이름/코드 부분일치로 후보를 최대 MAX_CANDIDATES개 보여준다.
        function searchByName() {
            const needle = document.getElementById('name').value.trim().toLowerCase();
            if (!needle) { setStatus('종목명을 입력하세요.', true); return; }
            const matched = [];
            for (const item of master) {
                const hay = (item.name + ' ' + item.iscd).toLowerCase();
                if (hay.includes(needle)) {
                    matched.push(item);
                    if (matched.length >= MAX_CANDIDATES) break;
                }
            }
            renderCandidates(matched);
        }

        function renderCandidates(matched) {
            const box = document.getElementById('candidates');
            box.innerHTML = '';
            if (matched.length === 0) {
                box.style.display = 'none';
                setStatus('검색 결과가 없습니다.', true);
                return;
            }
            matched.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cand';
                div.textContent = `${item.name} · ${item.iscd} (${item.market})`;
                // 선택하면 코드+이름+거래소를 함께 확정.
                div.onclick = () => {
                    document.getElementById('iscd').value = item.iscd;
                    document.getElementById('name').value = item.name;
                    document.getElementById('exchange').value = item.market || '';
                    hideCandidates();
                    setStatus(`선택: ${item.name} · ${item.iscd}`);
                };
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        function hideCandidates() {
            const box = document.getElementById('candidates');
            box.style.display = 'none';
            box.innerHTML = '';
        }

        // 행의 불리언 필드 토글용 체크박스(변경 시 해당 행 값을 TRUE/FALSE로 갱신).
        function makeFlagCheckbox(row, field, labelText) {
            const label = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = truthy(row[field]);
            cb.onchange = () => { row[field] = cb.checked ? 'TRUE' : 'FALSE'; };
            label.appendChild(cb);
            label.appendChild(document.createTextNode(' ' + labelText));
            return label;
        }

        function render() {
            const ul = document.getElementById('list');
            ul.innerHTML = '';
            if (rows.length === 0) {
                const li = document.createElement('li');
                li.className = 'empty';
                li.textContent = `등록된 ${MARKET_CONFIG[market].label} 종목이 없습니다.`;
                ul.appendChild(li);
                return;
            }
            rows.forEach((row, idx) => {
                const li = document.createElement('li');

                const info = document.createElement('div');
                info.className = 'info';
                const nameText = row.name || '(이름 없음)';
                const codeText = [row.iscd, row.exchange].filter(Boolean).join(' · ');
                info.innerHTML = `<div class="nm">${escapeHtml(nameText)}</div>` +
                                 `<div class="code">${escapeHtml(codeText)}</div>`;

                const flags = document.createElement('div');
                flags.className = 'flags';
                flags.appendChild(makeFlagCheckbox(row, 'is_used', '사용'));
                flags.appendChild(makeFlagCheckbox(row, 'regular_only', '정규장전용'));

                const del = document.createElement('button');
                del.className = 'del';
                del.textContent = '삭제';
                del.onclick = () => { rows.splice(idx, 1); render(); };

                li.appendChild(info);
                li.appendChild(flags);
                li.appendChild(del);
                ul.appendChild(li);
            });
        }

        function addRow() {
            const iscd = document.getElementById('iscd').value.trim();
            const name = document.getElementById('name').value.trim();
            const exchange = document.getElementById('exchange').value.trim();
            if (!iscd || !name) {
                setStatus('종목코드와 종목명을 입력해주세요.', true);
                return;
            }
            // market_key는 대상 시장으로 고정(봇에서도 강제로 다시 채운다).
            rows.push({
                market_key: market,
                iscd: iscd,
                name: name,
                exchange: exchange,
                is_used: document.getElementById('new-is-used').checked ? 'TRUE' : 'FALSE',
                regular_only: document.getElementById('new-regular-only').checked ? 'TRUE' : 'FALSE',
            });
            document.getElementById('iscd').value = '';
            document.getElementById('name').value = '';
            document.getElementById('exchange').value = '';
            document.getElementById('new-is-used').checked = true;
            document.getElementById('new-regular-only').checked = false;
            hideCandidates();
            setStatus(`추가됨: ${name} · ${iscd}`);
            render();
        }

        function save() {
            // 최종 목록과 대상 시장을 봇으로 전송하고 웹앱 닫기.
            // 봇에는 message.web_app_data.data 로 이 JSON이 도착한다.
            tg.sendData(JSON.stringify({ market: market, rows: rows }));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        loadInitialData();
        applyMarketUi();
        render();
        loadMaster();
    </script>
</body>
</html>
