<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5분봉 차트</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 16px; background: #f6f8fb; color: #1c2430; }
        h2 { margin: 0 0 6px; }
        .muted { color: #697789; font-size: 13px; margin-bottom: 12px; }
        .card { background: #fff; border: 1px solid #d9e0e8; border-radius: 10px; padding: 12px; margin-bottom: 12px; }

        /* 국장/미장 탭 */
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab {
            flex: 1;
            border: 1px solid #ccd6e2;
            border-radius: 10px;
            background: #fff;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            color: #4a5a6d;
        }
        .tab.active { background: #eaf4ff; border-color: #7db4e8; color: #14538f; }

        ul { list-style: none; padding: 0; margin: 0; max-height: 55vh; overflow: auto; }
        li { padding: 12px 10px; border-bottom: 1px solid #edf1f5; cursor: pointer; }
        li:last-child { border-bottom: none; }
        li.active { background: #eaf4ff; }
        .name { font-weight: 700; }
        .meta { font-size: 12px; color: #617184; margin-top: 3px; }
        .empty { padding: 14px 10px; color: #8494a6; font-size: 14px; }

        #submit {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(120deg, #1257a0, #2f7fd1);
        }
        #submit:disabled { opacity: 0.45; }
        .warn { color: #9f2d2d; font-size: 13px; min-height: 18px; margin-top: 8px; }
    </style>
</head>
<body>
    <h2>📈 5분봉 차트</h2>
    <div class="muted">시장을 고른 뒤 종목을 선택하면 차트를 보내드립니다.</div>

    <div class="tabs">
        <button type="button" class="tab active" data-market="domestic">국장</button>
        <button type="button" class="tab" data-market="overseas">미장</button>
    </div>

    <div class="card">
        <ul id="item-list"></ul>
    </div>

    <button id="submit" disabled>차트 받기</button>
    <div class="warn" id="warn"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let rows = [];          // [{market_key, iscd, name}]
        let market = "domestic";
        let selected = null;

        // 봇이 실은 ?data= 페이로드 복원. 압축 base64url(deflate)이 기본이고,
        // `{`로 시작하면 구형 평문 JSON으로 간주해 그대로 파싱한다(옛 메시지 호환).
        // 서버 쪽 services/webapp_payload.py 의 encode_payload와 대응한다.
        async function decodePayload(raw) {
            if (raw.startsWith('{')) return JSON.parse(raw);
            const b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate'));
            return JSON.parse(await new Response(stream).text());
        }

        // 봇이 보낸 관리 종목 목록: ?data=<압축 payload> {"action":"price_form","rows":[...]}
        (async function loadRows() {
            try {
                const raw = new URLSearchParams(window.location.search).get("data");
                if (!raw) return;
                const parsed = await decodePayload(raw);
                if (parsed && parsed.action === "price_form" && Array.isArray(parsed.rows)) {
                    rows = parsed.rows;
                    renderList();
                }
            } catch (e) {
                document.getElementById("warn").textContent = "종목 목록을 읽지 못했습니다: " + e;
            }
        })();

        function renderList() {
            const listEl = document.getElementById("item-list");
            listEl.innerHTML = "";

            const items = rows.filter(r => r.market_key === market);
            if (items.length === 0) {
                const li = document.createElement("li");
                li.className = "empty";
                li.textContent = (market === "domestic" ? "국장" : "미장") + " 관리 종목이 없습니다.";
                listEl.appendChild(li);
                return;
            }

            items.forEach(item => {
                const li = document.createElement("li");
                li.innerHTML = `<div class="name">${item.name || item.iscd}</div>` +
                    `<div class="meta">${item.iscd}</div>`;
                if (selected && selected.iscd === item.iscd && selected.market_key === item.market_key) {
                    li.classList.add("active");
                }
                li.addEventListener("click", () => {
                    selected = item;
                    document.getElementById("submit").disabled = false;
                    renderList();
                });
                listEl.appendChild(li);
            });
        }

        // 국장/미장 탭 전환
        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", () => {
                market = tab.dataset.market;
                selected = null;
                document.getElementById("submit").disabled = true;
                document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === tab));
                renderList();
            });
        });

        // 제출: 봇으로 {action, market, iscd, name} 전송 → 봇이 차트 생성/발송
        document.getElementById("submit").addEventListener("click", () => {
            if (!selected) return;
            tg.sendData(JSON.stringify({
                action: "price_submit",
                market: selected.market_key,
                iscd: selected.iscd,
                name: selected.name,
            }));
        });

        renderList();
    </script>
</body>
</html>
