<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구매 주문</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 16px; background: #f6f8fb; color: #1c2430; }
        h2 { margin: 0 0 10px; }
        .muted { color: #697789; font-size: 13px; margin-bottom: 12px; }
        .card { background: #fff; border: 1px solid #d9e0e8; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 260px; overflow: auto; }
        li { padding: 10px; border-bottom: 1px solid #edf1f5; cursor: pointer; }
        li:last-child { border-bottom: none; }
        li.active { background: #eaf4ff; }
        .name { font-weight: 700; }
        .meta { font-size: 12px; color: #617184; margin-top: 3px; }
        .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .row label { min-width: 85px; font-size: 14px; }
        input[type=text], input[type=number] {
            flex: 1;
            border: 1px solid #ccd6e2;
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .step { width: 40px; height: 36px; border: 1px solid #ccd6e2; border-radius: 8px; background: #fff; }
        .subinfo { color: #617184; font-size: 12px; margin-top: -2px; margin-bottom: 6px; padding-left: 93px; }
        .mode { display: flex; gap: 10px; margin-top: 6px; margin-bottom: 8px; }
        .mode label { min-width: 0; }
        #submit {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(120deg, #0a7d4f, #169c67);
            margin-top: 14px;
        }
        .warn { color: #9f2d2d; font-size: 13px; min-height: 18px; }
        .summary-card { border: 1px solid #d6e2ef; background: linear-gradient(180deg, #f8fbff, #f2f7fc); }
        .summary-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .summary-period { font-size: 12px; color: #5f6f82; margin-bottom: 8px; }
        .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
        .summary-item { border: 1px solid #e1ebf3; border-radius: 8px; background: #fff; padding: 8px; }
        .summary-label { font-size: 11px; color: #5f6f82; margin-bottom: 2px; }
        .summary-value { font-size: 13px; font-weight: 700; }
        .up { color: #c0342f; }
        .down { color: #1f5ea8; }
        .neutral { color: #324255; }
        .summary-line { margin-top: 8px; font-size: 12px; color: #324255; }
        .summary-line strong { font-weight: 700; }
        .zone-badge {
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid #d3dee9;
            background: #eef3f9;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-left: 6px;
            vertical-align: middle;
            color: #324255;
        }
        .zone-high { color: #b52b27; border-color: #efc6c4; background: #fff1f1; }
        .zone-low { color: #1f5ea8; border-color: #c3d7f1; background: #eff6ff; }
        .zone-mid { color: #596a7e; border-color: #d3dee9; background: #eef3f9; }
    </style>
</head>
<body>
    <h2 id="title">구매 주문</h2>
    <div class="muted" id="subtitle">시장을 선택해 주세요.</div>

    <div class="card summary-card" id="chart-summary-card" style="display:none">
        <div class="summary-title">텔레그램 5분봉 요약</div>
        <div class="summary-period" id="summary-period">-</div>
        <div class="summary-grid">
            <div class="summary-item">
                <div class="summary-label">Start</div>
                <div class="summary-value neutral" id="summary-start">-</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Current</div>
                <div class="summary-value" id="summary-current">-</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">High</div>
                <div class="summary-value" id="summary-high">-</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Low</div>
                <div class="summary-value" id="summary-low">-</div>
            </div>
        </div>
        <div class="summary-line">
            <strong id="summary-dd">DD: -</strong>
            <span class="zone-badge zone-mid" id="summary-zone-badge">MID RANGE</span>
        </div>
    </div>

    <div class="card">
        <ul id="item-list"></ul>
    </div>

    <div class="card">
        <div class="row">
            <label>선택 종목</label>
            <input id="selected-name" type="text" readonly>
        </div>

        <div class="mode">
            <label><input type="radio" name="mode" value="qty" checked> 가격/수량</label>
            <label><input type="radio" name="mode" value="budget"> 가격/예산</label>
        </div>

        <div class="row">
            <label>가격</label>
            <button class="step" onclick="shiftPrice(-1)">-</button>
            <input id="price" type="number" step="0.01" min="0">
            <button class="step" onclick="shiftPrice(1)">+</button>
        </div>

        <div class="row" id="qty-row">
            <label>수량</label>
            <button class="step" onclick="shiftQty(-1)">-</button>
            <input id="qty" type="number" step="1" min="1" value="1">
            <button class="step" onclick="shiftQty(1)">+</button>
        </div>

        <div class="row" id="budget-row" style="display:none">
            <label>예산</label>
            <button class="step" onclick="shiftBudgetShares(-1)">-</button>
            <input id="budget" type="number" step="0.01" min="0">
            <button class="step" onclick="shiftBudgetShares(1)">+</button>
        </div>
        <div id="budget-qty-info" class="subinfo" style="display:none"></div>

        <div class="warn" id="warn"></div>
        <button id="submit" onclick="submitOrder()">구매</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let market = "domestic";
        let rows = [];
        let selected = null;
        let chartSummary = null;

        function parseInitialData() {
            const raw = new URLSearchParams(window.location.search).get("data");
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                if (parsed && parsed.action === "purchase_form") {
                    if (parsed.market === "overseas") market = "overseas";
                    rows = Array.isArray(parsed.rows) ? parsed.rows : [];
                    chartSummary = null;
                } else if (parsed && parsed.action === "purchase_form_selected") {
                    if (parsed.market === "overseas") market = "overseas";
                    rows = parsed.item ? [parsed.item] : [];
                    chartSummary = parsed.chart_summary && typeof parsed.chart_summary === "object"
                        ? parsed.chart_summary
                        : null;
                }
            } catch (e) {
                console.error(e);
            }
        }

        function fmtSignedPct(v) {
            const n = Number(v || 0);
            return `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
        }

        function setTone(el, value) {
            el.classList.remove("up", "down", "neutral");
            const n = Number(value || 0);
            if (n > 0) {
                el.classList.add("up");
                return;
            }
            if (n < 0) {
                el.classList.add("down");
                return;
            }
            el.classList.add("neutral");
        }

        function applyZoneTone(el, zone) {
            el.classList.remove("zone-high", "zone-low", "zone-mid");
            if (zone === "NEAR HIGH") {
                el.classList.add("zone-high");
                return;
            }
            if (zone === "NEAR LOW") {
                el.classList.add("zone-low");
                return;
            }
            el.classList.add("zone-mid");
        }

        function zoneLabelKo(zone) {
            if (zone === "NEAR HIGH") return "고점 근접";
            if (zone === "NEAR LOW") return "저점 근접";
            return "중립 구간";
        }

        function renderChartSummary() {
            const card = document.getElementById("chart-summary-card");
            if (!chartSummary) {
                card.style.display = "none";
                return;
            }

            card.style.display = "block";
            document.getElementById("summary-period").textContent = `기간: ${chartSummary.period || "-"}`;

            const startEl = document.getElementById("summary-start");
            startEl.textContent = Number(chartSummary.start_price || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const currentEl = document.getElementById("summary-current");
            currentEl.textContent = `${Number(chartSummary.current_price || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} (${fmtSignedPct(chartSummary.current_change_pct)})`;
            setTone(currentEl, chartSummary.current_change_pct);

            const highEl = document.getElementById("summary-high");
            highEl.textContent = `${Number(chartSummary.high_price || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} (${fmtSignedPct(chartSummary.high_change_pct)}) @ ${chartSummary.high_time || "-"}`;
            setTone(highEl, chartSummary.high_change_pct);

            const lowEl = document.getElementById("summary-low");
            lowEl.textContent = `${Number(chartSummary.low_price || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} (${fmtSignedPct(chartSummary.low_change_pct)}) @ ${chartSummary.low_time || "-"}`;
            setTone(lowEl, chartSummary.low_change_pct);

            const ddEl = document.getElementById("summary-dd");
            ddEl.textContent = `DD: ${fmtSignedPct(chartSummary.dd_pct)}`;
            setTone(ddEl, chartSummary.dd_pct);

            const zoneEl = document.getElementById("summary-zone-badge");
            const zoneText = String(chartSummary.zone || "MID RANGE");
            zoneEl.textContent = zoneLabelKo(zoneText);
            applyZoneTone(zoneEl, zoneText);
        }

        function fmtPrice(v) {
            const n = Number(v || 0);
            if (market === "overseas") return `$${n.toFixed(2)}`;
            return `${Math.round(n).toLocaleString()}원`;
        }

        function setSubtitle() {
            const label = market === "overseas" ? "미장" : "국장";
            document.getElementById("title").textContent = `${label} 구매 주문`;
            document.getElementById("subtitle").textContent = `${label} 관리 종목 ${rows.length}개`;
        }

        function renderList() {
            const ul = document.getElementById("item-list");
            ul.innerHTML = "";
            if (rows.length === 0) {
                const li = document.createElement("li");
                li.textContent = "관리 종목이 없습니다.";
                ul.appendChild(li);
                return;
            }
            rows.forEach((row, i) => {
                const li = document.createElement("li");
                if (selected && selected.iscd === row.iscd) li.classList.add("active");
                li.innerHTML =
                    `<div class=\"name\">${escapeHtml(row.name || row.iscd)} (${escapeHtml(row.iscd || "")})</div>` +
                    `<div class=\"meta\">${escapeHtml(row.exchange || "")} · 현재가 ${fmtPrice(row.current_price || 0)}</div>`;
                li.onclick = () => pick(i);
                ul.appendChild(li);
            });
        }

        function pick(i) {
            selected = rows[i];
            document.getElementById("selected-name").value = `${selected.name || selected.iscd} (${selected.iscd})`;
            const p = Number(selected.current_price || 0);
            const step = Number(selected.price_step || (market === "overseas" ? 0.01 : 1));
            if (p > 0) {
                document.getElementById("price").value = market === "overseas" ? p.toFixed(2) : Math.round(p);
                const defaultBudget = p * 10;
                document.getElementById("budget").value = market === "overseas" ? defaultBudget.toFixed(2) : Math.round(defaultBudget);
            }
            document.getElementById("price").step = step;
            renderList();
            updateBudgetEstimatedQty();
        }

        function shiftPrice(direction) {
            const el = document.getElementById("price");
            let current = Number(el.value || 0);
            const step = selected ? Number(selected.price_step || 1) : 1;
            current = Math.max(step, current + direction * step);
            el.value = market === "overseas" ? current.toFixed(2) : Math.round(current);
            updateBudgetEstimatedQty();
        }

        function shiftQty(direction) {
            const el = document.getElementById("qty");
            const current = Number(el.value || 1);
            const next = Math.max(1, Math.round(current + direction));
            el.value = next;
        }

        function shiftBudgetShares(direction) {
            const price = Number(document.getElementById("price").value || 0);
            if (!(price > 0)) {
                warn("먼저 가격을 입력해 주세요.");
                return;
            }
            const budgetEl = document.getElementById("budget");
            const current = Number(budgetEl.value || 0);
            const unit = price; // 주수 단위(1주 가격)로 예산 증감
            const next = Math.max(0, current + direction * unit);
            budgetEl.value = market === "overseas" ? next.toFixed(2) : Math.round(next);
            updateBudgetEstimatedQty();
            warn("");
        }

        function updateBudgetEstimatedQty() {
            const mode = getMode();
            const info = document.getElementById("budget-qty-info");
            info.style.display = mode === "budget" ? "block" : "none";
            if (mode !== "budget") return;

            const price = Number(document.getElementById("price").value || 0);
            const budget = Number(document.getElementById("budget").value || 0);
            if (!(price > 0) || !(budget > 0)) {
                info.textContent = "예상 수량: -";
                return;
            }
            const qty = Math.floor(budget / price);
            info.textContent = `예상 수량: ${qty.toLocaleString()}주`;
        }

        function onModeChange() {
            const mode = getMode();
            document.getElementById("qty-row").style.display = mode === "qty" ? "flex" : "none";
            document.getElementById("budget-row").style.display = mode === "budget" ? "flex" : "none";
            updateBudgetEstimatedQty();
        }

        function getMode() {
            const selectedRadio = document.querySelector('input[name="mode"]:checked');
            return selectedRadio ? selectedRadio.value : "qty";
        }

        function warn(msg) {
            document.getElementById("warn").textContent = msg || "";
        }

        function submitOrder() {
            warn("");
            if (!selected) {
                warn("종목을 먼저 선택해 주세요.");
                return;
            }
            const price = Number(document.getElementById("price").value || 0);
            if (!(price > 0)) {
                warn("가격을 입력해 주세요.");
                return;
            }

            const mode = getMode();
            const payload = {
                action: "purchase_submit",
                market: market,
                item: {
                    iscd: selected.iscd,
                    name: selected.name,
                    exchange: selected.exchange || "",
                },
                mode: mode,
                price: price,
            };

            if (mode === "qty") {
                const qty = Number(document.getElementById("qty").value || 0);
                if (!Number.isInteger(qty) || qty <= 0) {
                    warn("수량은 1 이상의 정수여야 합니다.");
                    return;
                }
                payload.quantity = qty;
            } else {
                const budget = Number(document.getElementById("budget").value || 0);
                if (!(budget > 0)) {
                    warn("예산은 0보다 커야 합니다.");
                    return;
                }
                payload.budget = budget;
            }

            tg.sendData(JSON.stringify(payload));
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text == null ? "" : String(text);
            return div.innerHTML;
        }

        parseInitialData();
        setSubtitle();
        renderChartSummary();
        renderList();
        document.querySelectorAll('input[name="mode"]').forEach((el) => {
            el.addEventListener("change", onModeChange);
        });
        document.getElementById("price").addEventListener("input", updateBudgetEstimatedQty);
        document.getElementById("budget").addEventListener("input", updateBudgetEstimatedQty);
        onModeChange();
        if (rows.length > 0) pick(0);
    </script>
</body>
</html>
